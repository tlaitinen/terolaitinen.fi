<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 628" role="img" aria-labelledby="title desc" font-family="Inter, ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif">
  <title id="title">From artifacts to estimation: a feedback loop for AI-assisted delivery</title>
  <desc id="desc">A flowchart showing how project artifacts feed a compressed model that produces assumptions, work units, calendar projections, delivery signals, and estimation guidance, with agent runs feeding back into the assumption layer.</desc>

  <defs>

    <!-- Arrow marker -->
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>

    <!-- Subtle card shadow -->
    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#111827" flood-opacity="0.06"/>
    </filter>
  </defs>

  <!-- Canvas -->

  <!-- Decorative grid hint -->
  <g opacity="0.4">
    <circle cx="80" cy="80" r="2" fill="#9CA3AF"/>
    <circle cx="160" cy="80" r="2" fill="#9CA3AF"/>
    <circle cx="80" cy="160" r="2" fill="#9CA3AF"/>
    <circle cx="1120" cy="548" r="2" fill="#9CA3AF"/>
    <circle cx="1040" cy="548" r="2" fill="#9CA3AF"/>
    <circle cx="1120" cy="468" r="2" fill="#9CA3AF"/>
  </g>

  <!-- Title -->
  <text x="60" y="64" font-size="22" font-weight="600" fill="#111827" letter-spacing="-0.2">From artifacts to estimation</text>
  <text x="60" y="88" font-size="14" font-weight="400" fill="#6B7280">A feedback loop for AI-assisted project planning</text>

  <!-- Legend -->
  <g transform="translate(810, 56)" font-size="11" fill="#374151">
    <g transform="translate(0,0)"><rect width="10" height="10" rx="2" fill="#DBEAFE" stroke="#1D4ED8"/><text x="16" y="9">Source</text></g>
    <g transform="translate(70,0)"><rect width="10" height="10" rx="2" fill="#DCFCE7" stroke="#15803D"/><text x="16" y="9">Model</text></g>
    <g transform="translate(140,0)"><rect width="10" height="10" rx="2" fill="#FEF3C7" stroke="#B45309"/><text x="16" y="9">Estimate</text></g>
    <g transform="translate(220,0)"><rect width="10" height="10" rx="2" fill="#FCE7F3" stroke="#BE185D"/><text x="16" y="9">Feedback</text></g>
    <g transform="translate(305,0)"><rect width="10" height="10" rx="2" fill="#EDE9FE" stroke="#6D28D9"/><text x="16" y="9">Agent</text></g>
  </g>

  <!-- ========== TOP ROW: A → B → C → D → E ========== -->
  <!-- Card geometry: width 188, height 96, rx 12 -->
  <!-- y center = 230 -->

  <!-- Connectors (drawn first so they sit beneath cards) -->
  <g stroke-linecap="round" fill="none">
    <!-- A→B -->
    <line x1="248" y1="230" x2="282" y2="230" stroke="#374151" stroke-width="1.6" marker-end="url(#arrow)"/>
    <!-- B→C -->
    <line x1="478" y1="230" x2="512" y2="230" stroke="#374151" stroke-width="1.6" marker-end="url(#arrow)"/>
    <!-- C→D -->
    <line x1="708" y1="230" x2="742" y2="230" stroke="#374151" stroke-width="1.6" marker-end="url(#arrow)"/>
    <!-- D→E -->
    <line x1="938" y1="230" x2="972" y2="230" stroke="#374151" stroke-width="1.6" marker-end="url(#arrow)"/>
  </g>

  <!-- A: Artifacts (Source / blue) -->
  <g filter="url(#cardShadow)">
    <rect x="60" y="182" width="188" height="96" rx="12" fill="#DBEAFE" stroke="#1D4ED8" stroke-width="1.5"/>
    <text x="154" y="212" text-anchor="middle" font-size="14" font-weight="600" fill="#1E3A8A">Artifacts</text>
    <text x="154" y="234" text-anchor="middle" font-size="11" fill="#1E40AF">requirements, designs,</text>
    <text x="154" y="250" text-anchor="middle" font-size="11" fill="#1E40AF">architecture, code,</text>
    <text x="154" y="266" text-anchor="middle" font-size="11" fill="#1E40AF">issues</text>
  </g>

  <!-- B: Compressed view (Model / green) -->
  <g filter="url(#cardShadow)">
    <rect x="290" y="182" width="188" height="96" rx="12" fill="#DCFCE7" stroke="#15803D" stroke-width="1.5"/>
    <text x="384" y="212" text-anchor="middle" font-size="14" font-weight="600" fill="#14532D">Compressed view</text>
    <text x="384" y="234" text-anchor="middle" font-size="11" fill="#166534">current system,</text>
    <text x="384" y="250" text-anchor="middle" font-size="11" fill="#166534">desired state,</text>
    <text x="384" y="266" text-anchor="middle" font-size="11" fill="#166534">required changes</text>
  </g>

  <!-- C: Assumptions (Model / green) — this is the convergence node -->
  <g filter="url(#cardShadow)">
    <rect x="520" y="182" width="188" height="96" rx="12" fill="#DCFCE7" stroke="#15803D" stroke-width="2"/>
    <text x="614" y="212" text-anchor="middle" font-size="14" font-weight="600" fill="#14532D">Assumptions</text>
    <text x="614" y="234" text-anchor="middle" font-size="11" fill="#166534">scope, architecture,</text>
    <text x="614" y="250" text-anchor="middle" font-size="11" fill="#166534">dependencies,</text>
    <text x="614" y="266" text-anchor="middle" font-size="11" fill="#166534">validation</text>
  </g>

  <!-- D: Trackable work units (Model / green) -->
  <g filter="url(#cardShadow)">
    <rect x="750" y="182" width="188" height="96" rx="12" fill="#DCFCE7" stroke="#15803D" stroke-width="1.5"/>
    <text x="844" y="208" text-anchor="middle" font-size="14" font-weight="600" fill="#14532D">Trackable work</text>
    <text x="844" y="225" text-anchor="middle" font-size="14" font-weight="600" fill="#14532D">units</text>
    <text x="844" y="245" text-anchor="middle" font-size="11" fill="#166534">projects, milestones,</text>
    <text x="844" y="260" text-anchor="middle" font-size="11" fill="#166534">epics, features,</text>
    <text x="844" y="274" text-anchor="middle" font-size="11" fill="#166534">tasks</text>
  </g>

  <!-- E: Calendar projection (Estimate / amber) -->
  <g filter="url(#cardShadow)">
    <rect x="980" y="182" width="188" height="96" rx="12" fill="#FEF3C7" stroke="#B45309" stroke-width="1.5"/>
    <text x="1074" y="208" text-anchor="middle" font-size="14" font-weight="600" fill="#78350F">Calendar</text>
    <text x="1074" y="225" text-anchor="middle" font-size="14" font-weight="600" fill="#78350F">projection</text>
    <text x="1074" y="245" text-anchor="middle" font-size="11" fill="#92400E">critical path, availability,</text>
    <text x="1074" y="260" text-anchor="middle" font-size="11" fill="#92400E">review and release</text>
    <text x="1074" y="274" text-anchor="middle" font-size="11" fill="#92400E">constraints</text>
  </g>

  <!-- ========== BOTTOM ROW: F → G, with feedback G → C ========== -->
  <!-- F at right (under E), G at left of F. Arrows: E→F, F→G, G→C -->
  <!-- Bottom row y center = 410 -->

  <!-- Connectors for bottom flow -->
  <g stroke-linecap="round" fill="none">
    <!-- E down to F -->
    <path d="M 1074 278 L 1074 362" stroke="#374151" stroke-width="1.6" marker-end="url(#arrow)"/>
    <!-- F → G  (bottom row, right to left) -->
    <line x1="980" y1="410" x2="938" y2="410" stroke="#374151" stroke-width="1.6" marker-end="url(#arrow)"/>
    <!-- G → C  (feedback loop, dashed, curving up to Assumptions) -->
    <path d="M 750 410 C 680 410, 640 380, 614 282" stroke="#BE185D" stroke-width="1.8" stroke-dasharray="6 5" marker-end="url(#arrow)"/>
    <!-- Loop label -->
  </g>
  <text x="660" y="350" font-size="11" font-style="italic" fill="#BE185D" font-weight="500">refines</text>

  <!-- F: Delivery signals (Feedback / pink) -->
  <g filter="url(#cardShadow)">
    <rect x="980" y="362" width="188" height="96" rx="12" fill="#FCE7F3" stroke="#BE185D" stroke-width="1.5"/>
    <text x="1074" y="392" text-anchor="middle" font-size="14" font-weight="600" fill="#831843">Delivery signals</text>
    <text x="1074" y="414" text-anchor="middle" font-size="11" fill="#9D174D">state transitions,</text>
    <text x="1074" y="430" text-anchor="middle" font-size="11" fill="#9D174D">regressions,</text>
    <text x="1074" y="446" text-anchor="middle" font-size="11" fill="#9D174D">completion</text>
  </g>

  <!-- G: Estimation guidance (Feedback / pink) -->
  <g filter="url(#cardShadow)">
    <rect x="750" y="362" width="188" height="96" rx="12" fill="#FCE7F3" stroke="#BE185D" stroke-width="1.5"/>
    <text x="844" y="388" text-anchor="middle" font-size="14" font-weight="600" fill="#831843">Estimation</text>
    <text x="844" y="405" text-anchor="middle" font-size="14" font-weight="600" fill="#831843">guidance</text>
    <text x="844" y="425" text-anchor="middle" font-size="11" fill="#9D174D">minimal corrections to</text>
    <text x="844" y="440" text-anchor="middle" font-size="11" fill="#9D174D">faulty assumptions</text>
  </g>

  <!-- ========== AGENT INPUTS (H, I) feeding into C ========== -->
  <!-- Place below-left of C, with arrows up-right into C -->

  <!-- Connectors for agent inputs -->
  <g stroke-linecap="round" fill="none">
    <!-- H → C  (lands on left side of Assumptions) -->
    <path d="M 154 410 C 280 410, 460 360, 530 282" stroke="#6D28D9" stroke-width="1.6" marker-end="url(#arrow)"/>
    <!-- I → C  (lands on bottom-center of Assumptions) -->
    <path d="M 384 458 C 440 440, 540 360, 600 282" stroke="#6D28D9" stroke-width="1.6" marker-end="url(#arrow)"/>
  </g>

  <!-- H: Repeated agent runs (Agent / purple) -->
  <g filter="url(#cardShadow)">
    <rect x="60" y="362" width="188" height="96" rx="12" fill="#EDE9FE" stroke="#6D28D9" stroke-width="1.5"/>
    <text x="154" y="388" text-anchor="middle" font-size="14" font-weight="600" fill="#4C1D95">Repeated</text>
    <text x="154" y="405" text-anchor="middle" font-size="14" font-weight="600" fill="#4C1D95">agent runs</text>
    <text x="154" y="428" text-anchor="middle" font-size="11" fill="#5B21B6">estimate</text>
    <text x="154" y="443" text-anchor="middle" font-size="11" fill="#5B21B6">distribution</text>
  </g>

  <!-- I: Agentic review (Agent / purple) -->
  <g filter="url(#cardShadow)">
    <rect x="290" y="410" width="188" height="96" rx="12" fill="#EDE9FE" stroke="#6D28D9" stroke-width="1.5"/>
    <text x="384" y="436" text-anchor="middle" font-size="14" font-weight="600" fill="#4C1D95">Agentic review</text>
    <text x="384" y="458" text-anchor="middle" font-size="11" fill="#5B21B6">assumption</text>
    <text x="384" y="473" text-anchor="middle" font-size="11" fill="#5B21B6">convergence</text>
  </g>

  <!-- Footer hint -->
  <text x="60" y="595" font-size="11" fill="#9CA3AF">Solid arrows: forward flow · Dashed pink: refinement loop · Purple: agent inputs</text>
</svg>
