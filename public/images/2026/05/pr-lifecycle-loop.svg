<svg width="1200" height="627" viewBox="0 0 1200 627" xmlns="http://www.w3.org/2000/svg" font-family="Georgia, 'DejaVu Serif', serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fbfaf7"/>
      <stop offset="1" stop-color="#eeece4"/>
    </linearGradient>
    <linearGradient id="src" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#2563eb"/><stop offset="1" stop-color="#1d4ed8"/></linearGradient>
    <linearGradient id="rev" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#b45309"/><stop offset="1" stop-color="#92400e"/></linearGradient>
    <linearGradient id="acc" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#15803d"/><stop offset="1" stop-color="#166534"/></linearGradient>
    <linearGradient id="ana" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#7c3aed"/><stop offset="1" stop-color="#6d28d9"/></linearGradient>
    <linearGradient id="imp" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#0d9488"/><stop offset="1" stop-color="#0f766e"/></linearGradient>
    <linearGradient id="ret" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#475569"/><stop offset="1" stop-color="#334155"/></linearGradient>
    <linearGradient id="met" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#e11d48"/><stop offset="1" stop-color="#be123c"/></linearGradient>
    <filter id="card" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="4.5" flood-color="#1e293b" flood-opacity="0.18"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#475569"/>
    </marker>
    <marker id="arrowR" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#be123c"/>
    </marker>
  </defs>

  <!-- transparent background (no fill rect) -->

  <!-- =========================================================
       VERIFIED BOX COORDS (x,y,w,h):
       P 96,96,168,76    O 336,96,168,76   H 576,96,168,76   M 840,96,168,76
       A 840,250,168,84  I 560,248,168,92(diamond bbox)
       G 300,232,188,72  Q 300,360,188,72
       R 576,412,152,72  D 792,412,176,72  E 1024,406,152,84
       Edges used below are exact.
       ========================================================= -->

  <!-- ============ FORWARD CONNECTORS ============ -->
  <g stroke="#475569" stroke-width="2.5" fill="none" marker-end="url(#arrow)">
    <!-- Top row : P → O → H → M  (mid-y = 134) -->
    <path d="M264,134 L336,134"/>
    <path d="M504,134 L576,134"/>
    <path d="M744,134 L840,134"/>
    <!-- M → A : M bottom-center (924,172) → A top-center (924,250) -->
    <path d="M924,172 L924,250"/>
    <!-- A → I : A left edge (840,292) → diamond right tip (728,294) -->
    <path d="M840,292 L728,294"/>
    <!-- I → G : diamond left tip (560,294) → straight into G right edge (488,268) -->
    <path d="M560,294 L524,294 Q512,294 512,282 L512,268 L488,268"/>
    <!-- I → Q : diamond bottom tip (644,340) → down → into Q right edge upper (488,384) -->
    <path d="M644,340 L644,384 L488,384"/>
    <!-- G → R : G left edge (300,268) → left to x=272 → down → right into R left edge @ y=440 -->
    <path d="M300,268 L272,268 L272,440 L576,440"/>
    <!-- Q → R : Q bottom-center (440,432) → down to y=468 → right into R left edge @ y=468 -->
    <path d="M440,432 L440,468 L576,468"/>
    <!-- R → D : R right edge (728,448) → D left edge (792,448) -->
    <path d="M728,448 L792,448"/>
    <!-- D → E : D right edge (968,448) → E left edge (1024,448) -->
    <path d="M968,448 L1024,448"/>
  </g>

  <!-- ============ FEEDBACK LOOPS (dashed) ============ -->
  <!-- E → A : ROI of improvement loop. Clean orthogonal: Metrics left edge → up clear gap → left into A bottom-right corner area -->
  <path d="M1024,448 L996,448 L996,370 L944,370 L944,334"
        stroke="#be123c" stroke-width="2.5" stroke-dasharray="1 6" stroke-linecap="round" fill="none" marker-end="url(#arrowR)"/>
  <rect x="690" y="356" width="214" height="30" rx="15" fill="#fdf2f3" stroke="#be123c" stroke-width="1.25"/>
  <text x="797" y="375" font-size="12" font-weight="bold" fill="#be123c" text-anchor="middle">ROI of improvement loop</text>

  <!-- E → P : future prompts and model configs. E top → up to top channel → left → P top -->
  <path d="M1080,406 L1080,56 Q1080,40 1064,40 L196,40 Q180,40 180,56 L180,96"
        stroke="#be123c" stroke-width="2.5" stroke-dasharray="2 7" fill="none" marker-end="url(#arrowR)"/>
  <rect x="494" y="27" width="252" height="26" rx="13" fill="#fbf3f4" stroke="#be123c" stroke-width="1.25"/>
  <text x="620" y="45" font-size="12" font-weight="bold" fill="#be123c" text-anchor="middle">future prompts &amp; model configs</text>

  <!-- ============ CARDS ============ -->
  <!-- ===== Top row ===== -->
  <g filter="url(#card)"><rect x="96" y="96" width="168" height="76" rx="10" fill="url(#src)"/></g>
  <text x="180" y="128" font-size="16" font-weight="bold" fill="#fff" text-anchor="middle">PR prompt</text>
  <text x="180" y="149" font-size="11.5" fill="#dbeafe" text-anchor="middle">scope &amp; model meta</text>

  <g filter="url(#card)"><rect x="336" y="96" width="168" height="76" rx="10" fill="url(#src)"/></g>
  <text x="420" y="124" font-size="16" font-weight="bold" fill="#fff" text-anchor="middle">Opened PR</text>
  <text x="420" y="144" font-size="11.5" fill="#dbeafe" text-anchor="middle">diff, gates,</text>
  <text x="420" y="159" font-size="11.5" fill="#dbeafe" text-anchor="middle">agentic reviews</text>

  <g filter="url(#card)"><rect x="576" y="96" width="168" height="76" rx="10" fill="url(#rev)"/></g>
  <text x="660" y="124" font-size="16" font-weight="bold" fill="#fff" text-anchor="middle">Human review</text>
  <text x="660" y="144" font-size="11.5" fill="#fde7c8" text-anchor="middle">comments &amp;</text>
  <text x="660" y="159" font-size="11.5" fill="#fde7c8" text-anchor="middle">revisions</text>

  <g filter="url(#card)"><rect x="840" y="96" width="168" height="76" rx="10" fill="url(#acc)"/></g>
  <text x="924" y="128" font-size="16" font-weight="bold" fill="#fff" text-anchor="middle">Merged state</text>
  <text x="924" y="149" font-size="11.5" fill="#d1f2dd" text-anchor="middle">accepted outcome</text>

  <!-- ===== Middle : G (top-left), Q (lower-left), I (diamond), A (right) ===== -->
  <g filter="url(#card)"><rect x="300" y="232" width="188" height="72" rx="10" fill="url(#imp)"/></g>
  <text x="394" y="256" font-size="14.5" font-weight="bold" fill="#fff" text-anchor="middle">Guidance surface PR</text>
  <text x="394" y="276" font-size="11" fill="#ccfbf1" text-anchor="middle">docs, rubrics,</text>
  <text x="394" y="291" font-size="11" fill="#ccfbf1" text-anchor="middle">templates</text>

  <g filter="url(#card)"><rect x="300" y="360" width="188" height="72" rx="10" fill="url(#imp)"/></g>
  <text x="394" y="384" font-size="14.5" font-weight="bold" fill="#fff" text-anchor="middle">Quality gate PR</text>
  <text x="394" y="404" font-size="11" fill="#ccfbf1" text-anchor="middle">checks, reviewers,</text>
  <text x="394" y="419" font-size="11" fill="#ccfbf1" text-anchor="middle">policies</text>

  <g filter="url(#card)"><path d="M644,248 L728,294 L644,340 L560,294 Z" fill="url(#ana)"/></g>
  <text x="644" y="290" font-size="13" font-weight="bold" fill="#fff" text-anchor="middle">Improvement</text>
  <text x="644" y="307" font-size="11.5" fill="#e9d5ff" text-anchor="middle">candidate?</text>

  <g filter="url(#card)"><rect x="840" y="250" width="168" height="84" rx="10" fill="url(#ana)"/></g>
  <text x="924" y="280" font-size="14.5" font-weight="bold" fill="#fff" text-anchor="middle">Lifecycle analysis</text>
  <text x="924" y="300" font-size="10.5" fill="#e9d5ff" text-anchor="middle">accepted deltas, scope</text>
  <text x="924" y="315" font-size="10.5" fill="#e9d5ff" text-anchor="middle">drift, reviewer errors</text>

  <!-- ===== Bottom : R → D → E ===== -->
  <g filter="url(#card)"><rect x="576" y="412" width="152" height="72" rx="10" fill="url(#ret)"/></g>
  <text x="652" y="444" font-size="15" font-weight="bold" fill="#fff" text-anchor="middle">Retry</text>
  <text x="652" y="464" font-size="11.5" fill="#cbd5e1" text-anchor="middle">clarified task</text>

  <g filter="url(#card)"><rect x="792" y="412" width="176" height="72" rx="10" fill="url(#ret)"/></g>
  <text x="880" y="438" font-size="15" font-weight="bold" fill="#fff" text-anchor="middle">Semantic delta</text>
  <text x="880" y="458" font-size="11" fill="#cbd5e1" text-anchor="middle">from accepted outcome</text>

  <g filter="url(#card)"><rect x="1024" y="406" width="152" height="84" rx="10" fill="url(#met)"/></g>
  <text x="1100" y="434" font-size="15" font-weight="bold" fill="#fff" text-anchor="middle">Metrics</text>
  <text x="1100" y="453" font-size="10.5" fill="#ffe4e6" text-anchor="middle">one-shot success,</text>
  <text x="1100" y="467" font-size="10.5" fill="#ffe4e6" text-anchor="middle">value-per-token,</text>
  <text x="1100" y="481" font-size="10.5" fill="#ffe4e6" text-anchor="middle">reviewer FP / FN</text>
</svg>
